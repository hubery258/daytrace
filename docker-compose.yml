services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/task_app.db
    volumes:
      - ./data:/app/data
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    ports:
      - "5173:5173"
    working_dir: /app
    environment:
      - API_TARGET=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npx vite --host 0.0.0.0"
    restart: unless-stopped
